<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>{{ site.title | default: site.github.repository_name }} - {{ page.title }}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ 'assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
</head>
<body>
    <div class="main">
        <header class="container py-3">
            <div class="row">
                <div class="col">
                    <h1><a href="{{ "/" | prepend: site.baseurl }}" class="text-body text-decoration-none">{{ site.title | default: site.github.repository_name }}</a></h1>
                </div>
            </div>
        </header>

        <div class="container">
            <div class="row">
                <div class="col-md-3">
                    <button class="navbar-toggler d-md-none mb-3" type="button" data-bs-toggle="collapse" data-bs-target="#sidebarNav" aria-controls="sidebarNav" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <nav class="collapse d-md-block" id="sidebarNav">
                        <ul class="nav flex-column">
                            <li class="nav-item">
                                <a class="nav-link{% if page.path == 'index.md' %} active{% endif %}" href="{{ "/" | prepend: site.baseurl }}">Overview</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link{% if page.path == 'getting-started.md' %} active{% endif %}" href="{{ "/getting-started" | prepend: site.baseurl }}">Getting Started</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link{% if page.path == 'file-organization.md' %} active{% endif %}" href="{{ "/file-organization" | prepend: site.baseurl }}">File Organization</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="{{ site.github.repository_url }}">View on GitHub</a>
                            </li>
                        </ul>
                    </nav>
                </div>
                <main class="col-md-9">
                    {{ content }}
                </main>
            </div>
        </div>

        <footer class="container mt-5 pt-4 border-top">
            <div class="row">
                <div class="col text-center text-muted small pb-3">
                    <p>&copy; {{ "now" | date: "%Y" }} {{ site.title | default: site.github.repository_name }}</p>
                </div>
            </div>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script>
        document.querySelectorAll('h1[id], h2[id], h3[id], h4[id], h5[id], h6[id]').forEach(function (heading) {
            const a = document.createElement('a');
            a.href = '#' + heading.id;
            a.textContent = heading.textContent;
            a.className = 'text-body text-decoration-none';
            heading.textContent = '';
            heading.appendChild(a);
        });
    </script>
</body>
</html>
